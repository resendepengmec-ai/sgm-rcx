<script>
(function() {
  const user = getCurrentUser();
  if (!user) { window.location.href = 'index.html'; return; }
  const role = ROLES[user.role];
  if (!role || !role.modules.includes('chamados')) { window.location.href = 'index.html'; return; }
  document.getElementById('auth-overlay').style.display = 'none';
  // Carrega dados do backend (mantém localStorage como cache)
  DB.getAll('chamados').then(data => {
    if (data && data.length > 0) {
      chamados = data;
      localStorage.setItem('chamados_list', JSON.stringify(data));
      renderList();
    }
  }).catch(() => {});
  const chip = document.getElementById('user-chip');
  const r = ROLES[user.role] || {};
  chip.innerHTML = `
    <div style="cursor:pointer" onclick="document.getElementById('umenu').classList.toggle('hidden')">
      ${user.picture ? `<img src="${user.picture}" style="width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,.4)">` : `<div style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center">${r.icon||'👤'}</div>`}
    </div>
    <div class="user-menu hidden" id="umenu">
      <div class="user-menu-header">
        <div style="font-weight:600;font-size:14px">${user.name}</div>
        <div style="font-size:12px;color:#475569">${user.email}</div>
        <span class="role-badge" style="background:${r.color}22;color:${r.color}">${r.icon} ${r.label}</span>
      </div>
      <button class="user-menu-item" onclick="window.location.href='index.html'">🏠 Início</button>
      <hr style="border:none;border-top:1px solid #e2e8f0">
      <button class="user-menu-item danger" onclick="logout()">🚪 Sair</button>
    </div>`;
  document.addEventListener('click', e => { if (!e.target.closest('#user-chip')) document.getElementById('umenu')?.classList.add('hidden'); });

  // Solicitante: só vê os próprios chamados e só pode criar
  if (user.role === 'solicitante') {
    const origGetFiltered = window.getFiltered;
    // Will be patched after main JS loads
    window._filterByUser = true;
    window._userId = user.email;
  }
  if (!role.canCreate) document.querySelectorAll('.fab, #nav-new').forEach(el => el.style.display='none');
  // Gestor: sem botão novo
  if (user.role === 'gestor') document.querySelectorAll('.fab, #nav-new').forEach(el => el.style.display='none');
  window._currentUser = user; window._currentRole = role;
})();
</script>
<script>

// << MACHINE_DB INJECTED BY db.js >>

// ── State ──
let chamados = JSON.parse(localStorage.getItem('chamados_list') || '[]');
let settings = JSON.parse(localStorage.getItem('chamados_settings') || '{}');
let newPhotos = [];
let editingId = null;
let currentDetailId = null;
let selectedMachine = null;
let tagTimeout = null;
let filterMonth = '';
let filterContract = '';
let filterEstab = '';
let filterStatus = '';

const genId = () => 'CH' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,4).toUpperCase();
const today = () => new Date().toISOString().slice(0,10);
const fmtDate = d => d ? new Date(d+'T12:00:00').toLocaleDateString('pt-BR') : '—';

const PRIORITY_MAP = {
  urgente: { label:'Urgente', cls:'prio-urgente', bar:'urgente', icon:'🔴' },
  alta:    { label:'Alta',    cls:'prio-alta',    bar:'alta',    icon:'🟡' },
  normal:  { label:'Normal',  cls:'prio-normal',  bar:'normal',  icon:'🔵' },
  baixa:   { label:'Baixa',   cls:'prio-baixa',   bar:'baixa',   icon:'⚪' },
};
const STATUS_MAP = {
  aberto:    { label:'Aberto',        cls:'badge-aberto' },
  andamento: { label:'Em andamento',  cls:'badge-andamento' },
  resolvido: { label:'Resolvido',     cls:'badge-resolvido' },
  cancelado: { label:'Cancelado',     cls:'badge-cancelado' },
};

// ── Navigation ──
function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + (tab==='list'?'list':tab==='new'?'new':'settings')).classList.add('active');
  document.getElementById('nav-' + (tab==='list'?'list':tab==='new'?'new':'settings')).classList.add('active');
  document.getElementById('fab').classList.toggle('hidden', tab !== 'list');
  if (tab === 'list') renderList();
  if (tab === 'settings') loadSettings();
}

// ── Filters ──
function buildFilterOptions() {
  const months = new Set();
  chamados.forEach(c => { if (c.date) months.add(c.date.slice(0,7)); });
  const mSel = document.getElementById('f-filter-month');
  const curM = mSel.value;
  mSel.innerHTML = '<option value="">📅 Todos os meses</option>' +
    [...months].sort().reverse().map(m => {
      const [y,mo] = m.split('-');
      const lbl = new Date(y,mo-1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
      return `<option value="${m}" ${curM===m?'selected':''}>${lbl}</option>`;
    }).join('');

  const relevant = filterContract ? chamados.filter(c=>c.client===filterContract) : chamados;
  const estabs = new Set();
  relevant.forEach(c => { if (c.machine?.estabelecimento) estabs.add(c.machine.estabelecimento); });
  const eSel = document.getElementById('f-filter-estab');
  const curE = eSel.value;
  eSel.innerHTML = '<option value="">🏢 Todos os estabelecimentos</option>' +
    [...estabs].sort().map(e=>`<option value="${e}" ${curE===e?'selected':''}>${e}</option>`).join('');
}
function applyFilters() {
  filterMonth    = document.getElementById('f-filter-month').value;
  filterContract = document.getElementById('f-filter-contract').value;
  filterEstab    = document.getElementById('f-filter-estab').value;
  filterStatus   = document.getElementById('f-filter-status').value;
  buildFilterOptions();
  renderList();
}
function clearFilters() {
  filterMonth=filterContract=filterEstab=filterStatus='';
  ['f-filter-month','f-filter-contract','f-filter-estab','f-filter-status'].forEach(id=>document.getElementById(id).value='');
  buildFilterOptions(); renderList();
}
function getFiltered() {
  return [...chamados].filter(c => {
    const mM = !filterMonth    || (c.date&&c.date.startsWith(filterMonth));
    const cM = !filterContract || c.client===filterContract;
    const eM = !filterEstab    || c.machine?.estabelecimento===filterEstab;
    const sM = !filterStatus   || c.status===filterStatus;
    return mM&&cM&&eM&&sM;
  }).sort((a,b)=>{
    const prioOrder={urgente:0,alta:1,normal:2,baixa:3};
    return (prioOrder[a.priority]||2)-(prioOrder[b.priority]||2) || (b.createdAt-a.createdAt);
  });
}

// ── List ──
function renderList() {
  buildFilterOptions();
  const filtered = getFiltered();
  const list = document.getElementById('chamados-list');
  const empty = document.getElementById('chamados-empty');
  const total = filtered.length;
  const active = [filterMonth,filterContract,filterEstab,filterStatus].filter(Boolean).length;
  document.getElementById('filter-count-label').innerHTML = active
    ? `<strong>${total}</strong> chamado${total!==1?'s':''} encontrado${total!==1?'s':''}`
    : `<strong>${total}</strong> chamado${total!==1?'s':''} no total`;

  if (!total) { list.innerHTML=''; empty.style.display=''; return; }
  empty.style.display='none';

  let lastMonth='';
  list.innerHTML = filtered.map(c => {
    const p = PRIORITY_MAP[c.priority]||PRIORITY_MAP.normal;
    const s = STATUS_MAP[c.status]||STATUS_MAP.aberto;
    const month = c.date?c.date.slice(0,7):'';
    let header='';
    if (month!==lastMonth) {
      lastMonth=month;
      const ml = month ? new Date(month+'-02').toLocaleDateString('pt-BR',{month:'long',year:'numeric'}) : 'Sem data';
      header=`<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);padding:12px 0 6px">${ml}</div>`;
    }
    const thumb = c.photos&&c.photos[0]
      ? `<div class="cc-thumb"><img src="${c.photos[0].dataUrl}" alt="foto"></div>`
      : `<div class="cc-thumb">📷</div>`;
    return header + `<div class="chamado-card" onclick="openDetail('${c.id}')">
      <div class="cc-bar ${p.bar}"></div>
      ${thumb}
      <div class="cc-info">
        <div class="cc-title">${c.id} · TAG ${c.equip||'—'}</div>
        <div class="cc-meta">Contrato ${c.client} · ${fmtDate(c.date)}${c.requester?' · '+c.requester:''}</div>
        ${c.machine?`<div class="cc-meta" style="color:var(--text-3)">${c.machine.estabelecimento} · ${c.machine.recinto}</div>`:''}
        <div class="cc-desc">${c.desc||''}</div>
      </div>
      <div class="cc-right">
        <span class="badge ${s.cls}">${s.label}</span>
        <span class="prio-badge ${p.cls}">${p.icon} ${p.label}</span>
        ${c.photos&&c.photos.length?`<span style="font-size:12px;color:var(--text-3)">${c.photos.length}📷</span>`:''}
        ${_sigTrail(c._signatures)}
</div>
    </div>`;
  }).join('');
}

// ── New / Edit ──
function startNew() {
  editingId=null; newPhotos=[]; selectedMachine=null;
  document.getElementById('f-client').value='';
  document.getElementById('f-equip').value='';
  document.getElementById('f-date').value=today();
  document.getElementById('f-priority').value='normal';
  document.getElementById('f-requester').value='';
  document.getElementById('f-desc').value='';
  hideMachineInfo(); renderPhotoGrid(); switchTab('new');
}
function cancelNew() { switchTab('list'); }

function saveChamado() {
  const client = document.getElementById('f-client').value.trim();
  const equip  = document.getElementById('f-equip').value.trim();
  const desc   = document.getElementById('f-desc').value.trim();
  if (!client) { showToast('Selecione o contrato'); return; }
  if (!equip)  { showToast('Informe a TAG do equipamento'); return; }
  if (!desc)   { showToast('Descreva o problema'); return; }
  const c = {
    id: editingId || genId(),
    client, equip,
    machine: selectedMachine||null,
    date: document.getElementById('f-date').value,
    priority: document.getElementById('f-priority').value,
    requester: document.getElementById('f-requester').value,
    desc,
    photos: newPhotos,
    status: editingId ? (chamados.find(x=>x.id===editingId)?.status||'aberto') : 'aberto',
    createdAt: editingId ? (chamados.find(x=>x.id===editingId)?.createdAt||Date.now()) : Date.now(),
  };
  if (editingId) { const i=chamados.findIndex(x=>x.id===editingId); chamados[i]=c; }
  else chamados.unshift(c)
  // Assinatura digital
  const _sid_c = c.id;
  const _sedit_c = !!editingId;
  signRecord(_sid_c, _sedit_c ? 'editado' : 'criado', 'chamados').then(sig => {
    const _rec = chamados.find(x=>x.id===_sid_c);
    if (_rec) { _rec._signatures = _rec._signatures||[]; _rec._signatures.push(sig); }
  }).catch(()=>{});
  persist();
  showToast(editingId?'Chamado atualizado!':'Chamado aberto!');
  editingId=null; newPhotos=[]; switchTab('list');
}

function editChamado(id) {
  closeDetailModal();
  const c=chamados.find(x=>x.id===id); if(!c) return;
  editingId=id; newPhotos=c.photos?[...c.photos]:[]; selectedMachine=c.machine||null;
  document.getElementById('f-client').value=c.client||'';
  document.getElementById('f-equip').value=c.equip||'';
  document.getElementById('f-date').value=c.date||today();
  document.getElementById('f-priority').value=c.priority||'normal';
  document.getElementById('f-requester').value=c.requester||'';
  document.getElementById('f-desc').value=c.desc||'';
  if (c.machine) showMachineInfo(c.machine); else hideMachineInfo();
  renderPhotoGrid(); switchTab('new');
  document.querySelector('#screen-new .btn-primary').innerHTML='💾 Salvar alterações';
}

function deleteChamado(id) {
  if (!confirm('Excluir este chamado?')) return;
  chamados=chamados.filter(c=>c.id!==id);
  persist(); closeDetailModal(); showToast('Chamado excluído');
}

function updateStatus(id, status) {
  const c=chamados.find(x=>x.id===id); if(c){ c.status=status; persist(); openDetail(id); }
}

function persist() {
  // Cache local
  try { localStorage.setItem('chamados_list', JSON.stringify(chamados)); } catch(e) {}
  renderList();
  // Sync backend (último item modificado)
  const last = chamados[0];
  if (last) DB.save('chamados', last).catch(e => console.warn('Sync chamado:', e.message));
}

// ── Photos ──
function handlePhotoInput(e){ addPhotos(Array.from(e.target.files)); e.target.value=''; }
function handleDrop(e){ e.preventDefault(); document.getElementById('photo-area').classList.remove('drag'); addPhotos(Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'))); }
function addPhotos(files) {
  const MAX = 3, MAX_PX = 800;
  const slots = MAX - (newPhotos||[]).length;
  if (slots <= 0) { showToast('Máximo de 3 fotos por registro'); return; }
  const toAdd = files.filter(f=>f.type.startsWith('image/')).slice(0, slots);
  if (files.length > slots) showToast('Limite de 3 fotos — algumas ignoradas');
  toAdd.forEach(file => {
    const r = new FileReader();
    r.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w=img.width, h=img.height;
        if (w>MAX_PX||h>MAX_PX) {
          if(w>h){h=Math.round(h*MAX_PX/w);w=MAX_PX;}
          else{w=Math.round(w*MAX_PX/h);h=MAX_PX;}
        }
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        newPhotos.push({ dataUrl:canvas.toDataURL('image/jpeg',0.75), name:file.name });
        renderPhotoGrid();
      };
      img.src = ev.target.result;
    };
    r.readAsDataURL(file);
  });
}
function removePhoto(i){ newPhotos.splice(i,1); renderPhotoGrid(); }
function renderPhotoGrid(){
  const grid=document.getElementById('photo-grid');
  const badge=document.getElementById('photo-badge');
  badge.style.display=newPhotos.length?'':'none'; badge.textContent=newPhotos.length;
  grid.innerHTML=newPhotos.map((p,i)=>`<div class="photo-thumb"><img src="${p.dataUrl}" onclick="openLightbox('${p.dataUrl}')"><button class="remove-photo" onclick="removePhoto(${i})">×</button></div>`).join('');
}

// ── Lightbox ──
function openLightbox(src){ document.getElementById('lightbox-img').src=src; document.getElementById('lightbox').classList.remove('hidden'); }
function closeLightbox(){ document.getElementById('lightbox').classList.add('hidden'); }

// ── TAG lookup ──
function onTagInput(){
  const val=document.getElementById('f-equip').value.trim();
  clearTimeout(tagTimeout); hideMachineInfo();
  if(!val){document.getElementById('tag-suggestions').style.display='none';return;}
  tagTimeout=setTimeout(()=>showTagSuggestions(val),150);
}
function showTagSuggestions(q){
  const contract=document.getElementById('f-client').value;
  if(!contract){showToast('Selecione o contrato primeiro');return;}
  const list=getEffectiveDB()[contract]||[];
  const matches=list.filter(m=>m.tag.startsWith(q)||m.estabelecimento.toLowerCase().includes(q.toLowerCase())||m.recinto.toLowerCase().includes(q.toLowerCase())).slice(0,12);
  const box=document.getElementById('tag-suggestions');
  if(!matches.length){box.style.display='none';return;}

}

const OS_KEY = 'smm_ordens_servico';

function gerarOS(chamadoId) {
  const c = chamados.find(x=>x.id===chamadoId); if(!c) return;
  const allOS = JSON.parse(localStorage.getItem(OS_KEY)||'[]');
  // Número sequencial por chamado
  const existentes = allOS.filter(o=>o.chamadoId===chamadoId).length;
  const numero = `OS-${chamadoId}-${String(existentes+1).padStart(2,'0')}`;
  const os = {
    id:         'os-'+Date.now(),
    numero,
    chamadoId,
    chamadoDesc: c.desc||'',
    contrato:   c.client,
    tag:        c.equip||'',
    machine:    c.machine||null,
    prioridade: c.priority||'normal',
    solicitante:c.requester||'',
    status:     'aberta',
    criadoEm:   Date.now(),
    criadoPor:  getCurrentUser()?.name||'',
    tecnico:    '',
    registroId: null,
  };
  allOS.push(os);
  localStorage.setItem(OS_KEY, JSON.stringify(allOS));
  // Muda status do chamado para em andamento
  if (c.status==='aberto') {
    c.status='andamento';
    try{localStorage.setItem('chamados_list',JSON.stringify(chamados));}catch(e){}
  }
  showToast(`✅ ${numero} gerada! Disponível em Registros → O.S. Pendentes`);
  closeDetailModal();
  renderList();
}

const _baseGetFiltered = getFiltered;

  if (window._filterByUser) {
    list = list.filter(c => c.requester === window._currentUser?.name || c._ownerEmail === window._currentUser?.email);
  }
  return list;
};

// Patch: tag owner email on save
const _baseSaveChamado = saveChamado;
saveChamado = function() {
  // inject owner email before saving
  const user = window._currentUser;
  if (user) {
    const origUnshift = Array.prototype.unshift;
    // will be picked up by saveChamado's chamados.unshift
  }
  _baseSaveChamado();
  // tag the newly created chamado with owner email
  if (window._currentUser && chamados.length) {
    const latest = chamados[0];
    if (!latest._ownerEmail) {
      latest._ownerEmail = window._currentUser.email;
      persist();
    }
  }
};

const _origOpenDetailC = openDetail;
openDetail = function(id) {
  _origOpenDetailC(id);
  const role = window._currentRole || {};
  if (!role.canEdit) document.querySelectorAll('[onclick*="editChamado"]').forEach(b => b.style.display='none');
  if (!role.canDelete) document.querySelectorAll('[onclick*="deleteChamado"]').forEach(b => b.style.display='none');
  // Solicitante cannot change status
  if (window._currentUser?.role === 'solicitante') {
    document.querySelectorAll('select[onchange*="updateStatus"]').forEach(s => s.disabled = true);
  }
};

// ── Render assinaturas no card ────────────────────────────────────
function _sigTrail(sigs) {
  if (!sigs || !sigs.length) return '';
  const icons = {criado:'✅',editado:'✏️',aprovado:'✔️',rejeitado:'✕',executado:'⚙️',concluido:'🏁',gerado:'📋'};
  const roles = {admin:'Admin',gestor:'Gestor',tecnico:'Técnico',solicitante:'Solicitante'};
  const entries = sigs.map(s => {
    const dt = new Date(s.at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    return `${icons[s.action]||'•'} <strong>${s.by_name||s.by||'?'}</strong> · ${roles[s.role]||s.role} · ${dt} <code style="font-family:monospace;font-size:10px;background:#fff;border:1px solid #e2e8f0;border-radius:3px;padding:0 3px;color:#94a3b8">[${(s.hash||'').slice(0,6)}]</code>`;
  });
  return `<div style="font-size:11px;color:#94a3b8;margin-top:8px;padding:6px 10px;background:#f5f6fa;border-radius:6px;border-left:3px solid #e2e8f0;line-height:1.8">${entries.join(' <span style="color:#e2e8f0;padding:0 4px">|</span> ')}</div>`;
}
</script>
