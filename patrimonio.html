<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#7c3aed">
<title>Patrimônio — Sistema de Manutenção</title>
<link rel="stylesheet" href="shared.css">
<style>
:root{--primary:#7c3aed;--primary-dark:#5b21b6;--primary-light:#f5f3ff;
--text:#0f172a;--text-2:#475569;--text-3:#94a3b8;
--border:#e2e8f0;--bg:#f5f6fa;--surface:#fff;
--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.10);
--success:#16a34a;--success-bg:#f0fdf4;--danger:#dc2626;--danger-bg:#fef2f2;--warning:#d97706;--warning-bg:#fffbeb;}
body{padding-bottom:80px;background:var(--bg);color:var(--text);}

.mov-card{background:var(--surface);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);border-left:4px solid var(--border);}
.mov-card.pendente{border-left-color:#f59e0b;}
.mov-card.aprovada{border-left-color:#16a34a;}
.mov-card.rejeitada{border-left-color:#dc2626;}
.mov-card.executada{border-left-color:#7c3aed;}

.badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;}
.badge.pendente{background:#fef3c7;color:#92400e;}
.badge.aprovada{background:var(--success-bg);color:var(--success);}
.badge.rejeitada{background:var(--danger-bg);color:var(--danger);}
.badge.executada{background:#ede9fe;color:#5b21b6;}

.tipo-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;}
.tipo-badge.instalar{background:#d1fae5;color:#065f46;}
.tipo-badge.realocar{background:#dbeafe;color:#1e40af;}
.tipo-badge.baixar{background:var(--danger-bg);color:var(--danger);}
.tipo-badge.adicionar{background:#ede9fe;color:#5b21b6;}

.filter-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:99px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:600;cursor:pointer;color:var(--text-2);}
.filter-pill.active{border-color:var(--primary);background:var(--primary-light);color:var(--primary);}
.filter-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}

.admin-actions{display:flex;gap:8px;margin-top:10px;}
.btn-approve{flex:1;padding:10px;border-radius:8px;border:none;background:var(--success);color:#fff;font-size:13px;font-weight:600;cursor:pointer;}
.btn-reject{flex:1;padding:10px;border-radius:8px;border:1.5px solid var(--danger);background:none;color:var(--danger);font-size:13px;font-weight:600;cursor:pointer;}
.btn-execute{width:100%;padding:10px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;}

.section-header{font-size:12px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px;}

.pending-banner{background:#fef3c7;border:1px solid #fde68a;border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:13px;color:#92400e;}
.pending-count{background:#f59e0b;color:#fff;border-radius:99px;padding:2px 8px;font-weight:700;font-size:12px;}
</style>
</head>
<body>
<div class="auth-overlay" id="auth-overlay"><div class="spinner"></div><p>Verificando acesso…</p></div>

<header class="app-header" style="background:var(--primary)">
  <button class="back-btn" onclick="window.location.href='index.html'">← Início</button>
  <h1 style="flex:1;margin-left:8px">Movimentação Patrimonial</h1>
  <button id="btn-nova-mov" onclick="openNewMovimento()" style="color:#fff;font-size:22px;background:rgba(255,255,255,.15);border-radius:50%;width:36px;height:36px;border:none;cursor:pointer">+</button>
</header>

<!-- Lista -->
<div id="screen-list" style="padding:12px">
  <div id="pending-banner" style="display:none" class="pending-banner">
    ⏳ <span id="pending-text">Solicitações pendentes de aprovação</span>
    <span class="pending-count" id="pending-count">0</span>
  </div>

  <div class="filter-row" id="filter-pills">
    <button class="filter-pill active" onclick="setFilter('todos')">Todas</button>
    <button class="filter-pill" onclick="setFilter('pendente')">⏳ Pendentes</button>
    <button class="filter-pill" onclick="setFilter('aprovada')">✅ Aprovadas</button>
    <button class="filter-pill" onclick="setFilter('executada')">✔ Executadas</button>
    <button class="filter-pill" onclick="setFilter('rejeitada')">✕ Rejeitadas</button>
  </div>

  <div id="mov-list"></div>
  <div id="mov-empty" style="display:none;text-align:center;padding:48px 16px;color:var(--text-3)">
    <div style="font-size:48px;margin-bottom:12px">📦</div>
    <div style="font-size:16px;font-weight:600;margin-bottom:6px">Nenhuma movimentação</div>
    <div style="font-size:13px">Clique em + para solicitar uma movimentação</div>
  </div>

  <div class="section-header">Histórico do banco de equipamentos</div>
  <div id="patrimonio-summary" style="background:var(--surface);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);font-size:13px;color:var(--text-2)">
    Carregando…
  </div>
</div>

<!-- Form nova movimentação -->
<div id="screen-form" style="padding:12px;display:none">
  <div style="background:var(--surface);border-radius:var(--radius);padding:16px">
    <h2 style="font-size:17px;font-weight:700;margin-bottom:16px">Nova solicitação de movimentação</h2>

    <div class="field">
      <label>Tipo de movimentação *</label>
      <select id="f-tipo" onchange="updateFormByTipo()">
        <option value="">Selecione…</option>
        <option value="instalar">🟢 Instalar — adicionar nova TAG</option>
        <option value="realocar">🔵 Realocar — mover para outro local</option>
        <option value="baixar">🔴 Baixar — retirar (inviável/inativo)</option>
        <option value="adicionar">🟣 Adicionar equipamento existente</option>
      </select>
    </div>

    <div class="field">
      <label>Contrato *</label>
      <select id="f-contrato" onchange="loadTagsByContract()">
        <option value="">Selecione o contrato…</option>
      </select>
    </div>

    <!-- TAG existente (realocar / baixar) -->
    <div id="field-tag-existente" style="display:none" class="field">
      <label>TAG do equipamento *</label>
      <input id="f-tag" type="text" list="tag-suggestions" placeholder="Digite ou selecione a TAG…" autocomplete="off">
      <datalist id="tag-suggestions"></datalist>
      <div id="tag-info" style="font-size:12px;color:var(--text-2);margin-top:4px;display:none"></div>
    </div>

    <!-- Campos para instalar / adicionar -->
    <div id="fields-nova-tag" style="display:none">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="field">
          <label>Nova TAG *</label>
          <input id="f-nova-tag" type="text" placeholder="Ex: 1020-0001">
        </div>
        <div class="field">
          <label>Marca</label>
          <input id="f-marca" type="text" placeholder="Ex: Carrier">
        </div>
        <div class="field">
          <label>Tipo / Modelo</label>
          <input id="f-tipo-equip" type="text" placeholder="Ex: Split 12000 BTU">
        </div>
        <div class="field">
          <label>Capacidade</label>
          <input id="f-capacidade" type="text" placeholder="Ex: 12.000 BTU">
        </div>
      </div>
    </div>

    <!-- Destino (realocar / instalar) -->
    <div id="fields-destino" style="display:none">
      <div class="field">
        <label>Estabelecimento destino *</label>
        <input id="f-estab-destino" type="text" list="estab-suggestions" placeholder="Nome do estabelecimento">
        <datalist id="estab-suggestions"></datalist>
      </div>
      <div class="field">
        <label>Recinto destino</label>
        <input id="f-recinto-destino" type="text" placeholder="Ex: Sala de reuniões">
      </div>
    </div>

    <!-- Motivo (sempre) -->
    <div class="field">
      <label>Motivo / Justificativa *</label>
      <textarea id="f-motivo" rows="3" placeholder="Descreva o motivo da movimentação…"></textarea>
    </div>

    <div class="field">
      <label>Observações adicionais</label>
      <textarea id="f-obs-mov" rows="2" placeholder="Informações complementares…"></textarea>
    </div>

    <div class="action-bar" style="margin-top:16px">
      <button class="btn btn-secondary" onclick="cancelForm()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveMovimento()">📤 Enviar solicitação</button>
    </div>
  </div>
</div>

<!-- Modal de aprovação/rejeição -->
<div id="modal-review" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;flex-direction:column;justify-content:flex-end">
  <div style="background:var(--surface);border-radius:16px 16px 0 0;padding:20px;max-height:80vh;overflow-y:auto">
    <div style="width:36px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 16px"></div>
    <h3 id="modal-title" style="font-size:17px;font-weight:700;margin-bottom:14px">Revisar solicitação</h3>
    <div id="modal-details" style="font-size:13px;color:var(--text-2);line-height:2;margin-bottom:14px"></div>
    <div id="modal-reject-field" style="display:none" class="field">
      <label>Motivo da rejeição</label>
      <textarea id="f-motivo-rejeicao" rows="2" placeholder="Informe o motivo…"></textarea>
    </div>
    <div class="admin-actions" id="modal-actions"></div>
    <button onclick="closeModal()" style="width:100%;margin-top:10px;padding:10px;border-radius:8px;border:1px solid var(--border);background:none;font-size:13px;color:var(--text-2);cursor:pointer">Fechar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  window.SMM_API = 'https://smm-backend-a8a4.onrender.com';
</script>
<script src="api-client.js"></script>
<script src="db.js"></script>
<script>
// ── Auth ──────────────────────────────────────────────────────────
const user = getCurrentUser();
const isAdmin = user?.role === 'admin';
if (!user) { window.location.href = 'index.html'; }
else {
  document.getElementById('auth-overlay').style.display = 'none';
  DB.getMovimentacoes().then(data => {
    if (data) {
      movimentos = data;
      localStorage.setItem('smm_movimentacoes', JSON.stringify(data));
      renderList();
    }
  }).catch(()=>{});
  // Apenas admin, técnico e gestor acessam
  if (!['admin','tecnico','gestor'].includes(user.role)) {
    showToast('Sem permissão para acessar este módulo');
    setTimeout(()=>window.location.href='index.html',1500);
  }
}

// ── Data ──────────────────────────────────────────────────────────
const MOV_KEY  = 'smm_movimentacoes';
const CONT_KEY = 'smm_contracts';
let movimentos = [];
let contracts  = [];
let currentFilter = 'todos';
let reviewId = null;

function loadData() {
  movimentos = JSON.parse(localStorage.getItem(MOV_KEY)  || '[]');
  contracts  = JSON.parse(localStorage.getItem(CONT_KEY) || '[]');
}
function saveData(mov) {
  localStorage.setItem(MOV_KEY, JSON.stringify(movimentos));
  if (mov) DB.saveMovimentacao(mov).catch(e => console.warn('Sync mov:', e.message));
}

function showToast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

// ── Filter ────────────────────────────────────────────────────────
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-pill').forEach((p,i)=>{
    p.classList.toggle('active',['todos','pendente','aprovada','executada','rejeitada'][i]===f);
  });
  renderList();
}

// ── Render list ───────────────────────────────────────────────────
function renderList() {
  loadData();
  const pending = movimentos.filter(m=>m.status==='pendente');

  // Pending banner (admin only)
  if (isAdmin && pending.length) {
    document.getElementById('pending-banner').style.display = '';
    document.getElementById('pending-count').textContent = pending.length;
    document.getElementById('pending-text').textContent =
      `${pending.length} solicitação${pending.length>1?'ões':''} aguardando aprovação`;
  } else {
    document.getElementById('pending-banner').style.display = 'none';
  }

  // Filter
  let filtered = currentFilter==='todos'
    ? movimentos
    : movimentos.filter(m=>m.status===currentFilter);

  // Non-admin só vê as próprias
  if (!isAdmin) filtered = filtered.filter(m=>m.solicitanteEmail===user.email);

  // Sort: pending first then by date
  filtered.sort((a,b)=>{
    if (a.status==='pendente' && b.status!=='pendente') return -1;
    if (b.status==='pendente' && a.status!=='pendente') return 1;
    return b.criadoEm - a.criadoEm;
  });

  const list  = document.getElementById('mov-list');
  const empty = document.getElementById('mov-empty');
  if (!filtered.length) { list.innerHTML=''; empty.style.display=''; }
  else {
    empty.style.display='none';
    list.innerHTML = filtered.map(m=>{
      const tipoLabel = {instalar:'Instalar',realocar:'Realocar',baixar:'Baixar',adicionar:'Adicionar'}[m.tipo]||m.tipo;
      const canReview = isAdmin && m.status==='pendente';
      const canExecute= isAdmin && m.status==='aprovada';
      const dataStr   = new Date(m.criadoEm).toLocaleDateString('pt-BR');
      return `
      <div class="mov-card ${m.status}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <span class="tipo-badge ${m.tipo}">${tipoLabel}</span>
            <span class="badge ${m.status}">${{pendente:'Pendente',aprovada:'Aprovada',rejeitada:'Rejeitada',executada:'Executada'}[m.status]||m.status}</span>
          </div>
          <span style="font-size:11px;color:var(--text-3)">${dataStr}</span>
        </div>
        <div style="font-size:14px;font-weight:700;margin-bottom:4px">
          TAG: ${m.tag||m.novaTag||'—'} · Contrato ${m.contrato||'—'}
        </div>
        <div style="font-size:12px;color:var(--text-2);margin-bottom:4px">
          Solicitado por: ${m.solicitanteNome||'—'}
        </div>
        <div style="font-size:13px;color:var(--text-2);margin-bottom:${canReview||canExecute?'10':'0'}px">
          ${m.motivo}
        </div>
        ${m.status==='rejeitada' && m.motivoRejeicao ? `
          <div style="font-size:12px;color:var(--danger);background:var(--danger-bg);border-radius:6px;padding:6px 10px;margin-bottom:6px">
            Motivo da rejeição: ${m.motivoRejeicao}
          </div>` : ''}
        ${m.status==='executada' ? `
          <div style="font-size:12px;color:var(--success);margin-top:4px">
            ✅ Executado em ${new Date(m.executadoEm).toLocaleDateString('pt-BR')} · Banco atualizado
          </div>` : ''}
        ${canReview ? `
          <div class="admin-actions">
            <button class="btn-approve" onclick="openReview('${m.id}','approve')">✅ Aprovar</button>
            <button class="btn-reject"  onclick="openReview('${m.id}','reject')">✕ Rejeitar</button>
          </div>` : ''}
        ${canExecute ? `<button class="btn-execute" onclick="executeMovimento('${m.id}')">⚙️ Executar no banco</button>` : ''}
      </div>`;
    }).join('');
  }

  // Summary
  renderSummary();
}

function renderSummary() {
  const db = getEffDB() || {};
  let total = 0;
  const byContract = {};
  Object.entries(db).forEach(([num,equips])=>{
    const active = (equips||[]).filter(e=>!e._inativo);
    total += active.length;
    byContract[num] = active.length;
  });
  document.getElementById('patrimonio-summary').innerHTML = `
    <div style="font-weight:700;margin-bottom:8px">Total de equipamentos ativos: ${total}</div>
    ${Object.entries(byContract).map(([k,v])=>`
      <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)">
        <span>Contrato ${k}</span><span style="font-weight:600">${v} equipamentos</span>
      </div>`).join('')}`;
}

// ── Form ──────────────────────────────────────────────────────────
function openNewMovimento() {
  loadData();
  // Preenche select de contratos
  const sel = document.getElementById('f-contrato');
  sel.innerHTML = '<option value="">Selecione o contrato…</option>' +
    contracts.map(c=>`<option value="${c.numero}">${c.numero} — ${c.razao}</option>`).join('');
  document.getElementById('f-tipo').value = '';
  document.getElementById('f-motivo').value = '';
  document.getElementById('f-obs-mov').value = '';
  updateFormByTipo();
  showScreen('form');
}

function updateFormByTipo() {
  const tipo = document.getElementById('f-tipo').value;
  const showExistente = ['realocar','baixar'].includes(tipo);
  const showNova      = ['instalar','adicionar'].includes(tipo);
  const showDestino   = ['instalar','realocar','adicionar'].includes(tipo);
  document.getElementById('field-tag-existente').style.display = showExistente ? '' : 'none';
  document.getElementById('fields-nova-tag').style.display     = showNova      ? '' : 'none';
  document.getElementById('fields-destino').style.display      = showDestino   ? '' : 'none';
}

function loadTagsByContract() {
  const num = document.getElementById('f-contrato').value;
  const db  = getEffDB() || {};
  const equip = (db[num]||[]).filter(e=>!e._inativo);
  const dl  = document.getElementById('tag-suggestions');
  dl.innerHTML = equip.map(e=>`<option value="${e.tag||e['tag']}">${e.tag||e['tag']} — ${e.tipo||''} ${e.marca||''}</option>`).join('');
  const dlE = document.getElementById('estab-suggestions');
  const estabs = [...new Set(equip.map(e=>e.estabelecimento||e['estabelecimento']||'').filter(Boolean))];
  dlE.innerHTML = estabs.map(e=>`<option value="${e}">`).join('');

  document.getElementById('f-tag').addEventListener('input', function() {
    const found = equip.find(e=>(e.tag||e['tag'])===this.value);
    const info  = document.getElementById('tag-info');
    if (found) {
      info.style.display='';
      info.textContent = `${found.tipo||''} ${found.marca||''} — ${found.estabelecimento||''} / ${found.recinto||''}`;
    } else { info.style.display='none'; }
  });
}

function cancelForm() { showScreen('list'); renderList(); }

function saveMovimento() {
  const tipo     = document.getElementById('f-tipo').value;
  const contrato = document.getElementById('f-contrato').value;
  const motivo   = document.getElementById('f-motivo').value.trim();
  if (!tipo)     { showToast('Selecione o tipo de movimentação'); return; }
  if (!contrato) { showToast('Selecione o contrato'); return; }
  if (!motivo)   { showToast('Informe o motivo'); return; }

  const tag      = document.getElementById('f-tag')?.value.trim() || '';
  const novaTag  = document.getElementById('f-nova-tag')?.value.trim() || '';
  if (['realocar','baixar'].includes(tipo) && !tag)     { showToast('Informe a TAG do equipamento'); return; }
  if (['instalar','adicionar'].includes(tipo) && !novaTag){ showToast('Informe a nova TAG'); return; }

  loadData();
  const mov = {
    id:               'mov-'+Date.now(),
    tipo, contrato, motivo,
    tag:              tipo==='realocar'||tipo==='baixar' ? tag : '',
    novaTag:          tipo==='instalar'||tipo==='adicionar' ? novaTag : '',
    marca:            document.getElementById('f-marca')?.value.trim()||'',
    tipoEquip:        document.getElementById('f-tipo-equip')?.value.trim()||'',
    capacidade:       document.getElementById('f-capacidade')?.value.trim()||'',
    estabelecimentoDestino: document.getElementById('f-estab-destino')?.value.trim()||'',
    recintoDestino:   document.getElementById('f-recinto-destino')?.value.trim()||'',
    obs:              document.getElementById('f-obs-mov').value.trim(),
    status:           'pendente',
    solicitanteEmail: user.email,
    solicitanteNome:  user.name,
    solicitantePerfil:user.role,
    criadoEm:         Date.now(),
  };
  movimentos.unshift(mov);
  saveData();
  showToast('Solicitação enviada! Aguardando aprovação do admin.');
  showScreen('list');
  renderList();
}

// ── Review modal ──────────────────────────────────────────────────
function openReview(id, action) {
  reviewId = id;
  loadData();
  const m = movimentos.find(x=>x.id===id); if (!m) return;
  const tipoLabel = {instalar:'Instalar',realocar:'Realocar',baixar:'Baixar',adicionar:'Adicionar'}[m.tipo]||m.tipo;
  document.getElementById('modal-title').textContent = `Revisar: ${tipoLabel} — TAG ${m.tag||m.novaTag||'—'}`;
  document.getElementById('modal-details').innerHTML = `
    <strong>Contrato:</strong> ${m.contrato}<br>
    <strong>Tipo:</strong> ${tipoLabel}<br>
    <strong>TAG:</strong> ${m.tag||m.novaTag||'—'}<br>
    ${m.estabelecimentoDestino ? `<strong>Destino:</strong> ${m.estabelecimentoDestino}${m.recintoDestino?' / '+m.recintoDestino:''}<br>` : ''}
    <strong>Motivo:</strong> ${m.motivo}<br>
    <strong>Solicitado por:</strong> ${m.solicitanteNome} (${m.solicitantePerfil})<br>
    <strong>Data:</strong> ${new Date(m.criadoEm).toLocaleDateString('pt-BR')}`;

  const rejectField = document.getElementById('modal-reject-field');
  rejectField.style.display = action==='reject' ? '' : 'none';
  document.getElementById('f-motivo-rejeicao').value = '';

  const actions = document.getElementById('modal-actions');
  if (action==='approve') {
    actions.innerHTML = `<button class="btn-approve" onclick="confirmApprove()">✅ Confirmar aprovação</button>`;
  } else {
    actions.innerHTML = `<button class="btn-reject" style="flex:1" onclick="confirmReject()">✕ Confirmar rejeição</button>`;
  }

  document.getElementById('modal-review').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-review').style.display = 'none';
  reviewId = null;
}

function confirmApprove() {
  loadData();
  const m = movimentos.find(x=>x.id===reviewId); if (!m) return;
  m.status       = 'aprovada';
  m.aprovadoPor  = user.name;
  m.aprovadoEm   = Date.now();
  saveData(m);
  DB.updateMovStatus(m.id, 'aprovada').catch(()=>{});
  closeModal();
  showToast('Solicitação aprovada! Clique em "Executar no banco" para aplicar.');
  renderList();
}

function confirmReject() {
  const motivo = document.getElementById('f-motivo-rejeicao').value.trim();
  if (!motivo) { showToast('Informe o motivo da rejeição'); return; }
  loadData();
  const m = movimentos.find(x=>x.id===reviewId); if (!m) return;
  m.status          = 'rejeitada';
  m.motivoRejeicao  = motivo;
  m.rejeitadoPor    = user.name;
  m.rejeitadoEm     = Date.now();
  saveData(m);
  DB.updateMovStatus(m.id, 'rejeitada', motivo).catch(()=>{});
  closeModal();
  showToast('Solicitação rejeitada.');
  renderList();
}

// ── Execute ───────────────────────────────────────────────────────
function executeMovimento(id) {
  loadData();
  const m = movimentos.find(x=>x.id===id);
  if (!m || m.status!=='aprovada') return;
  if (!confirm(`Executar "${m.tipo}" da TAG ${m.tag||m.novaTag} no banco de dados?\n\nEsta ação atualiza o banco de equipamentos.`)) return;

  const db = getEffDB() || {};
  const equips = db[m.contrato] || [];

  switch(m.tipo) {
    case 'instalar':
    case 'adicionar':
      if (equips.find(e=>(e.tag||e['tag'])===m.novaTag)) {
        showToast('TAG já existe no banco!'); return;
      }
      equips.push({
        tag:m.novaTag, marca:m.marca, tipo:m.tipoEquip,
        capacidade:m.capacidade,
        estabelecimento:m.estabelecimentoDestino,
        recinto:m.recintoDestino,
        _instaladoEm:Date.now(), _instaladoPor:user.name
      });
      break;
    case 'realocar': {
      const eq = equips.find(e=>(e.tag||e['tag'])===m.tag);
      if (!eq) { showToast('TAG não encontrada no banco!'); return; }
      eq.estabelecimento = m.estabelecimentoDestino || eq.estabelecimento;
      eq.recinto         = m.recintoDestino         || eq.recinto;
      eq._realocadoEm    = Date.now();
      eq._realocadoPor   = user.name;
      break;
    }
    case 'baixar': {
      const eq = equips.find(e=>(e.tag||e['tag'])===m.tag);
      if (!eq) { showToast('TAG não encontrada no banco!'); return; }
      eq._inativo   = true;
      eq._baixadoEm = Date.now();
      eq._baixadoPor= user.name;
      eq._motivoBaixa=m.motivo;
      break;
    }
  }

  db[m.contrato] = equips;
  localStorage.setItem('smm_custom_db', JSON.stringify(db));

  // Sync contracts
  const conts = JSON.parse(localStorage.getItem(CONT_KEY)||'[]');
  const ci = conts.findIndex(c=>c.numero===m.contrato);
  if (ci>=0) { conts[ci].equipamentos=equips; localStorage.setItem(CONT_KEY,JSON.stringify(conts)); }

  m.status      = 'executada';
  m.executadoEm = Date.now();
  m.executadoPor= user.name;
  saveData(m);
  DB.updateMovStatus(m.id, 'executada').catch(()=>{});
  showToast('✅ Banco de equipamentos atualizado!');
  renderList();
}

// ── Screen nav ────────────────────────────────────────────────────
function showScreen(s) {
  document.getElementById('screen-list').style.display = s==='list' ? '' : 'none';
  document.getElementById('screen-form').style.display = s==='form' ? '' : 'none';
}

// ── Init ──────────────────────────────────────────────────────────
renderList();
</script>
